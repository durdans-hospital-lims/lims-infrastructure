name: Terraform

on:
  push:
    branches: [main, enterprise-hardening]
    paths: ["terraform/**"]
  pull_request:
    branches: [main, enterprise-hardening]
    paths: ["terraform/**"]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.5"
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov (IaC misconfig scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: true # report findings without blocking the demo; tighten for prod
          output_format: cli
