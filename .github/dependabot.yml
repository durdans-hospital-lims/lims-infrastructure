version: 2
updates:
  - package-ecosystem: terraform
    directory: "/terraform"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      terraform:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      workflow-dependencies:
        patterns: ["*"]
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      docker-images:
        patterns: ["*"]
