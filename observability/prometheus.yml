global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules (outbox dead-letter, dispatch lag, 5xx, JVM/DB pool, critical-result
# SLA) are loaded from rules/*.yml — added in the observability workstream.
rule_files:
  - /etc/prometheus/rules/*.yml

# Send firing alerts to Alertmanager (added in the observability workstream, G2).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: lims-core-service
    metrics_path: /actuator/prometheus
    # The app exposes actuator on a SEPARATE internal management port (11001) that
    # is not published to the host, so scraping needs no auth and the public API
    # port (11000) never exposes metrics. Inside docker-compose the target is the
    # service DNS name. For a host-run app, use host.docker.internal:11001 instead.
    static_configs:
      - targets: ["app:11001"]

  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:8080"]
